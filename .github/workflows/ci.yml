name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint and syntax checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make lint

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest
      - run: python -m pip install -e ./python
      - run: python -m pytest
        working-directory: python

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - run: npm ci
        working-directory: javascript
      - run: npm test
        working-directory: javascript

  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: go/go.mod
      - run: go test ./...
        working-directory: go

  zig:
    name: Zig tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"
      - run: zig build test
        working-directory: zig

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: rust
      - run: cargo test
        working-directory: rust

  tree-sitter:
    name: Tree-sitter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tree-sitter-kvl/package-lock.json
      - run: npm ci
        working-directory: tree-sitter-kvl
      - run: npm test
        working-directory: tree-sitter-kvl

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: python3 conformance/run.py
